<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DKM3MTBKQ6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DKM3MTBKQ6');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor de Ensaio | Admin Seven</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-ensaios.css" />
</head>
<body>
<header class="admin-topbar">
  <div class="container admin-topbar-inner">
    <a href="./index.html" class="admin-brand" aria-label="Voltar ao painel">
      <img src="../assets/img/v7/icon_120.png" alt="V7" class="admin-v7" />
      <strong>Área de Administração</strong>
    </a>

    <div class="header-actions">
      <a href="../index.html" class="admin-view-site-link">Ver site</a>
      <button type="button" id="theme-toggle" aria-label="Alternar tema">🌙</button>
      <div class="admin-account">
        <button type="button" id="admin-account-toggle">Conta</button>
        <div id="admin-account-menu" class="admin-account-menu hidden">
          <img id="admin-user-photo" src="../assets/img/v7/icon_120.png" alt="Conta" class="admin-user-photo" />
          <p id="admin-user-email">admin@exemplo.com</p>
          <button type="button" id="admin-logout-button">Sair</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="admin-section-page">
  <section class="container">
    <a href="./ensaios.html" class="admin-back-link">← Voltar para Ensaios</a>
    <h1 id="editor-ensaio-title">Novo ensaio</h1>

    <form id="editor-ensaio-form" class="admin-form ensaio-editor-form">
      <label class="field-group">
        <span>Título do ensaio</span>
        <input id="ensaio-titulo" type="text" maxlength="120" placeholder="Ex.: Ensaio de sábado" required />
      </label>

      <label class="field-group">
        <span>Descrição (opcional)</span>
        <textarea id="ensaio-descricao" rows="4" maxlength="500" placeholder="Observações rápidas do ensaio"></textarea>
      </label>

      <div class="ensaio-picker-grid">
        <div class="field-group">
          <span>Buscar música cadastrada</span>
          <input id="ensaio-busca-musica" type="text" placeholder="Digite o nome da música" autocomplete="off" />
          <ul class="ensaio-search-list" id="ensaio-resultado-busca"></ul>
        </div>

        <div class="field-group">
          <span>Músicas do ensaio</span>
          <ol class="ensaio-selected-list" id="ensaio-musicas-selecionadas"></ol>
        </div>
      </div>

      <div class="admin-form-actions">
        <button type="submit" class="button-primary" id="salvar-ensaio-button">Salvar ensaio</button>
        <button type="button" id="delete-ensaio-button" class="button-danger">Excluir</button>
      </div>
    </form>
  </section>
</main>

<div id="global-loading" class="global-loading hidden" aria-hidden="true">
  <div class="spinner"></div>
</div>
<script type="module" src="../assets/js/app.js"></script>
<script type="module" src="../assets/js/auth-guard.js"></script>
<script type="module" src="../assets/js/pages/admin-editor-ensaio.js"></script>
</body>
</html>
