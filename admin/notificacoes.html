<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DKM3MTBKQ6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DKM3MTBKQ6');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notificações | Admin Seven</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-notificacoes.css" />
</head>
<body>
<header class="admin-topbar">
  <div class="container admin-topbar-inner">
    <a href="./index.html" class="admin-brand" aria-label="Voltar ao painel">
      <img src="../assets/img/v7/icon_120.png" alt="V7" class="admin-v7" />
      <strong>Área de Administração</strong>
    </a>
    <div class="header-actions">
      <button type="button" id="theme-toggle" aria-label="Alternar tema">🌙</button>
      <div class="admin-account">
        <button type="button" id="admin-account-toggle">Conta</button>
        <div id="admin-account-menu" class="admin-account-menu hidden">
          <img id="admin-user-photo" src="../assets/img/v7/icon_120.png" alt="Conta" class="admin-user-photo" />
          <p id="admin-user-email">admin@exemplo.com</p>
          <button type="button" id="admin-logout-button">Sair</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="admin-section-page">
  <section class="container">
    <a href="./index.html" class="admin-back-link">← Voltar ao painel</a>
    <h1>Notificações</h1>
    <p class="admin-intro">Crie, edite e controle os comunicados exibidos no site.</p>

    <form id="admin-notificacao-form" class="admin-form">
      <input type="hidden" id="notificacao-id" />
      <div class="admin-grid-two">
        <input type="text" id="notificacao-titulo" placeholder="Título da notificação *" required />
        <select id="notificacao-tipo" required>
          <option value="aviso">Aviso</option>
          <option value="novidade">Novidade</option>
          <option value="evento">Evento</option>
          <option value="destaque">Destaque</option>
        </select>
      </div>

      <textarea id="notificacao-mensagem" placeholder="Mensagem da notificação *" required></textarea>

      <div class="admin-grid-three">
        <label class="admin-field-block">
          <span>Data de início</span>
          <input type="datetime-local" id="notificacao-inicio" />
        </label>
        <label class="admin-field-block">
          <span>Data de expiração</span>
          <input type="datetime-local" id="notificacao-fim" />
        </label>
        <label class="admin-field-block">
          <span>Comportamento do popup</span>
          <select id="notificacao-popup-mode">
            <option value="device_once">Mostrar uma vez por dispositivo</option>
            <option value="daily">Mostrar uma vez por dia</option>
            <option value="always">Mostrar sempre que entrar</option>
          </select>
        </label>
      </div>

      <div class="admin-grid-two">
        <label class="admin-field-block">
          <span>Frequência da faixa do topo</span>
          <select id="notificacao-top-mode">
            <option value="device_once">Mostrar uma vez por dispositivo</option>
            <option value="daily">Mostrar uma vez por dia</option>
            <option value="always">Mostrar sempre (fecha por 15 min)</option>
          </select>
        </label>
      </div>

      <div class="admin-grid-two">
        <input type="text" id="notificacao-botao-texto" placeholder="Texto do botão (opcional)" />
        <input type="url" id="notificacao-botao-link" placeholder="Link do botão (opcional)" />
      </div>

      <div class="admin-switches-grid">
        <label class="admin-check"><input type="checkbox" id="notificacao-ativa" checked /> <span>Notificação ativa</span></label>
        <label class="admin-check"><input type="checkbox" id="notificacao-popup" /> <span>Exibir em popup</span></label>
        <label class="admin-check"><input type="checkbox" id="notificacao-home" /> <span>Exibir na home</span></label>
        <label class="admin-check"><input type="checkbox" id="notificacao-publica" checked /> <span>Exibir na página pública</span></label>
        <label class="admin-check"><input type="checkbox" id="notificacao-topo" /> <span>Exibir no topo</span></label>
        <label class="admin-check"><input type="checkbox" id="notificacao-antes-inicio" /> <span>Exibir antes da data de início</span></label>
      </div>

      <div class="admin-form-actions">
        <button type="submit" class="button-primary">Salvar notificação</button>
        <button type="button" id="notificacao-reset" class="button-outline">Limpar</button>
      </div>
    </form>

    <div class="admin-toolbar admin-toolbar-spaced">
      <h2 class="admin-subtitle">Notificações cadastradas</h2>
    </div>
    <div id="admin-notificacoes-list"></div>
  </section>
</main>

<div id="global-loading" class="global-loading hidden" aria-hidden="true"><div class="spinner"></div></div>
<script type="module" src="../assets/js/app.js"></script>
<script type="module" src="../assets/js/auth-guard.js"></script>
<script type="module" src="../assets/js/pages/admin-notificacoes.js"></script>
</body>
</html>
