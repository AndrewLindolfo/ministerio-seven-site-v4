<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocalistas | Admin Seven</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-vocalistas.css" />
</head>
<body>

<header class="admin-topbar">
  <div class="container admin-topbar-inner">
    <a href="./index.html" class="admin-brand" aria-label="Voltar ao painel">
      <img src="../assets/img/v7/icon_120.png" alt="V7" class="admin-v7" />
      <strong>Área de Administração</strong>
    </a>

    <div class="header-actions">
      <button type="button" id="theme-toggle" aria-label="Alternar tema">🌙</button>
      <div class="admin-account">
        <button type="button" id="admin-account-toggle">Conta</button>
        <div id="admin-account-menu" class="admin-account-menu hidden">
          <img id="admin-user-photo" src="../assets/img/v7/icon_120.png" alt="Conta" class="admin-user-photo" />
          <p id="admin-user-email">admin@exemplo.com</p>
          <button type="button" id="admin-logout-button">Sair</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="admin-section-page">
  <section class="container">
    <a href="./index.html" class="admin-back-link">← Voltar ao painel</a>
    <h1>Vocalistas</h1>
    <p class="admin-intro">Marque os usuários que poderão acessar a página Músicas Vocal.</p>

    <div class="admin-toolbar">
      <input type="search" id="admin-vocalistas-search" placeholder="Buscar por nome ou e-mail..." />
      <button type="button" id="admin-vocalistas-refresh" class="button-outline">Atualizar</button>
    </div>

    <div id="admin-vocalistas-list"></div>
  </section>
</main>

<div id="global-loading" class="global-loading hidden" aria-hidden="true">
  <div class="spinner"></div>
</div>
<script type="module" src="../assets/js/app.js"></script>
<script type="module" src="../assets/js/auth-guard.js"></script>
<script type="module" src="../assets/js/pages/admin-vocalistas.js"></script>
</body>
</html>
