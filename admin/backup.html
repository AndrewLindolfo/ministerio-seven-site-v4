<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-DKM3MTBKQ6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-DKM3MTBKQ6');
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backup | Admin Seven</title>
  <link rel="stylesheet" href="../assets/css/main.css" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/pages/admin-backup.css" />
</head>
<body>

<header class="admin-topbar">
  <div class="container admin-topbar-inner">
    <a href="./index.html" class="admin-brand" aria-label="Voltar ao painel">
      <img src="../assets/img/v7/icon_120.png" alt="V7" class="admin-v7" />
      <strong>Área de Administração</strong>
    </a>

    <div class="header-actions">
      <button type="button" id="theme-toggle" aria-label="Alternar tema">🌙</button>
      <div class="admin-account">
        <button type="button" id="admin-account-toggle">Conta</button>
        <div id="admin-account-menu" class="admin-account-menu hidden">
          <img id="admin-user-photo" src="../assets/img/v7/icon_120.png" alt="Conta" class="admin-user-photo" />
          <p id="admin-user-email">admin@exemplo.com</p>
          <button type="button" id="admin-logout-button">Sair</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="admin-section-page">
  <section class="container">
    <a href="./index.html" class="admin-back-link">← Voltar ao painel</a>
    <h1>Backup</h1>

    <div class="backup-actions">
      <button type="button" id="backup-export-button" class="button-primary">Fazer backup completo</button>

      <label for="backup-restore-input" class="button-outline backup-file-label">Escolher arquivo</label>
      <input type="file" id="backup-restore-input" accept=".json,application/json" hidden />
      <span id="backup-file-name" class="backup-file-name">Nenhum arquivo selecionado</span>

      <button type="button" id="backup-restore-button" class="button-outline">Recuperar backup</button>
    </div>

    <div class="backup-help">
      <p>O backup inclui: músicas, cifras, programações, álbuns, downloads, contatos, links, configurações e admins.</p>
      <small>Ao recuperar, os itens do arquivo são restaurados com os mesmos IDs no Firebase.</small>
    </div>
  </section>
</main>

<div id="global-loading" class="global-loading hidden" aria-hidden="true">
  <div class="spinner"></div>
</div>
<script type="module" src="../assets/js/app.js"></script>
<script type="module" src="../assets/js/auth-guard.js"></script>
<script type="module" src="../assets/js/pages/admin-backup.js"></script>
</body>
</html>
